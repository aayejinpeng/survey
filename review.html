<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  #topbar { padding: 8px 16px; background: #111; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #topbar h1 { font-size: 14px; color: #888; font-weight: 400; }
  #progress { font-size: 13px; color: #666; }
  #progress b { color: #ddd; }
  .nav-btn { background: #222; border: 1px solid #444; color: #ccc; padding: 4px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .nav-btn:hover { background: #333; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #save-btn { background: #1a3a1a; border-color: #2a5a2a; margin-left: auto; }
  #save-btn:hover { background: #2a5a2a; }
  #save-status { font-size: 12px; color: #4a4; }

  /* Grid */
  #grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 6px; padding: 6px; flex: 1; min-height: 0; }

  /* Card */
  .card { background: #141414; border: 1px solid #252525; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .card.marked-keep { border-color: #2a5a2a; }
  .card.marked-skip { border-color: #5a2a2a; opacity: 0.5; }

  .card-header { padding: 8px 12px 4px; flex-shrink: 0; }
  .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #666; margin-bottom: 4px; }
  .card-venue { color: #888; }
  .card-score { color: #888; font-family: monospace; }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.3; color: #ddd; }

  .card-abstract { padding: 6px 12px; flex: 1; overflow-y: auto; font-size: 13px; line-height: 1.5; color: #aaa; }
  .card-abstract::-webkit-scrollbar { width: 4px; }
  .card-abstract::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .card-footer { padding: 6px 10px; border-top: 1px solid #222; display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .tag-input { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 3px 8px; border-radius: 3px; font-size: 12px; flex: 1; min-width: 100px; }
  .tag-input:focus { outline: none; border-color: #555; }
  .quick-tag { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 2px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }
  .quick-tag:hover { background: #252525; color: #ccc; }
  .quick-tag.active { background: #2a3a1a; border-color: #4a6a2a; color: #8c8; }
  .quick-tag.skip { color: #a66; }
  .quick-tag.skip:hover { background: #3a1a1a; }
  .quick-tag.skip.active { background: #3a1a1a; border-color: #6a2a2a; color: #c88; }

  /* Keyword highlight colors */
  .kw { font-weight: 600; border-radius: 2px; padding: 0 1px; }

  /* Progress bar */
  #progress-bar { height: 2px; background: #1a1a1a; flex-shrink: 0; }
  #progress-fill { height: 100%; background: #4a6a2a; transition: width 0.3s; width: 0%; }

  /* Keyboard hint */
  #hint { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: #444; }
</style>
</head>
<body>

<div id="topbar">
  <h1>Paper Review</h1>
  <span id="progress"><b>0</b> / <b>0</b> reviewed</span>
  <button class="nav-btn" id="prev-btn" onclick="prevPage()" disabled>&larr; Prev</button>
  <button class="nav-btn" id="next-btn" onclick="nextPage()">Next &rarr;</button>
  <button class="nav-btn" id="save-btn" onclick="save()">Save</button>
  <span id="save-status"></span>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="grid"></div>

<div id="hint">1-4: keep &nbsp; QWER: skip &nbsp; &larr;&rarr;: navigate &nbsp; Space: next</div>

<script>
// State
let papers = [];
let kwList = []; // [{term, weight}]
let page = 0;
const PAGE_SIZE = 4;

// Init
async function init() {
  const [pRes, kRes] = await Promise.all([fetch('/api/papers'), fetch('/api/keywords')]);
  papers = await pRes.json();
  kwList = await kRes.json();
  render();
}

// Keyword highlighting
function weightToColor(weight) {
  const maxW = 10, minW = 1;
  // Map weight to lightness: low = 25% (dark), high = 60% (bright gold)
  const t = Math.min((weight - minW) / (maxW - minW), 1);
  const l = 25 + t * 35;
  return `hsl(43, 80%, ${l}%)`;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightKeywords(text) {
  if (!kwList.length) return escapeHtml(text);
  let html = escapeHtml(text);
  // Sort keywords by length desc to avoid partial overlap issues
  const sorted = [...kwList].sort((a, b) => b.term.length - a.term.length);
  for (const kw of sorted) {
    const escaped = kw.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`\\b(${escaped})\\b`, 'gi');
    const color = weightToColor(kw.weight);
    html = html.replace(re, `<span class="kw" style="color:${color}">$1</span>`);
  }
  return html;
}

// Render
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const start = page * PAGE_SIZE;
  const slice = papers.slice(start, start + PAGE_SIZE);

  for (let i = 0; i < PAGE_SIZE; i++) {
    const p = slice[i];
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${i}`;

    if (!p) {
      card.innerHTML = '<div class="card-abstract" style="text-align:center;color:#333;padding-top:60px;">— empty —</div>';
      grid.appendChild(card);
      continue;
    }

    const keep = (p.keep || '').trim().toLowerCase();
    if (keep === 'yes' || keep === 'keep') card.classList.add('marked-keep');
    if (keep === 'skip' || keep === 'no') card.classList.add('marked-skip');

    const notes = p.notes || '';
    const score = p.relevance_score || '0';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-meta">
          <span class="card-venue">${escapeHtml(p.venue || '')} ${escapeHtml(p.year || '')}</span>
          <span class="card-score">score ${score}</span>
        </div>
        <div class="card-title">${highlightKeywords(p.title || '')}</div>
      </div>
      <div class="card-abstract">${highlightKeywords(p.abstract || '')}</div>
      <div class="card-footer">
        <input class="tag-input" id="tags-${i}" value="${escapeHtml(notes)}" placeholder="tags..."
               onchange="markTag(${i})" onfocus="this.dataset.focused=1" onblur="delete this.dataset.focused">
        <button class="quick-tag ${keep==='keep'?'active':''}" onclick="quickMark(${i},'keep')">keep [${i+1}]</button>
        <button class="quick-tag ${keep==='core'?'active':''}" onclick="quickMark(${i},'core')">core</button>
        <button class="quick-tag ${keep==='related'?'active':''}" onclick="quickMark(${i},'related')">related</button>
        <button class="quick-tag skip ${keep==='skip'?'active':''}" onclick="quickMark(${i},'skip')">skip [${String.fromCharCode(81+i)}]</button>
      </div>
    `;
    grid.appendChild(card);
  }

  updateProgress();
  document.getElementById('prev-btn').disabled = page === 0;
  document.getElementById('next-btn').disabled = start + PAGE_SIZE >= papers.length;
}

function currentSlice() {
  return papers.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
}

function markTag(idx) {
  const p = currentSlice()[idx];
  if (!p) return;
  const tags = document.getElementById(`tags-${idx}`).value;
  p.notes = tags;
  apiMark(p.paper_id, p.keep, tags);
}

function quickMark(idx, label) {
  const p = currentSlice()[idx];
  if (!p) return;
  // Toggle: if already this label, clear it
  if (p.keep === label) {
    p.keep = '';
  } else {
    p.keep = label;
  }
  const tags = document.getElementById(`tags-${idx}`).value;
  p.notes = tags;
  apiMark(p.paper_id, p.keep, tags);
  render();
}

async function apiMark(paperId, keep, tags) {
  await fetch('/api/mark', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ paper_id: paperId, keep: keep, tags: tags }),
  });
}

async function save() {
  const el = document.getElementById('save-status');
  el.textContent = 'saving...';
  el.style.color = '#aa8';
  const res = await fetch('/api/save', { method: 'POST' });
  const data = await res.json();
  el.textContent = `saved ${data.count} papers`;
  el.style.color = '#4a4';
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function updateProgress() {
  const reviewed = papers.filter(p => p.keep && p.keep.trim()).length;
  document.getElementById('progress').innerHTML = `<b>${reviewed}</b> / <b>${papers.length}</b> reviewed &nbsp; page ${page+1}/${Math.ceil(papers.length/PAGE_SIZE)}`;
  document.getElementById('progress-fill').style.width = `${(reviewed/papers.length)*100}%`;
}

// Navigation
function nextPage() {
  const maxPage = Math.ceil(papers.length / PAGE_SIZE) - 1;
  if (page < maxPage) { page++; render(); }
}
function prevPage() {
  if (page > 0) { page--; render(); }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Don't capture when typing in input
  if (e.target.tagName === 'INPUT') return;

  const idx = '1234'.indexOf(e.key);
  if (idx >= 0) { quickMark(idx, 'keep'); return; }
  const skipIdx = 'qwer'.indexOf(e.key.toLowerCase());
  if (skipIdx >= 0) { quickMark(skipIdx, 'skip'); return; }
  if (e.key === 'ArrowRight' || e.key === 'd') { nextPage(); return; }
  if (e.key === 'ArrowLeft' || e.key === 'a') { prevPage(); return; }
  if (e.key === ' ') { e.preventDefault(); nextPage(); return; }
  if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); save(); return; }
});

init();
</script>
</body>
</html>
